<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notary App Icon Exporter</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0f2742;color:#fff;
    display:flex;flex-direction:column;align-items:center;gap:18px;padding:30px;margin:0}
  h1{font-size:18px;font-weight:600;margin:0}
  p{color:#b9c7d6;font-size:13px;max-width:520px;text-align:center;line-height:1.5;margin:0}
  #preview{width:256px;height:256px;border-radius:48px;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  button{background:#c8932a;color:#fff;border:none;border-radius:9px;padding:12px 26px;font-size:15px;
    font-weight:600;cursor:pointer}
  button:hover{background:#b58324}
  code{background:#1b3a5f;padding:2px 7px;border-radius:5px;font-size:12.5px}
</style>
</head>
<body>
  <h1>NY Notary — App Icon Exporter</h1>
  <p>Click the button to download <code>icon-only.png</code> (1024×1024). Move that file into the
     <code>assets/</code> folder, then run the icon-generation command in <code>README-MAC.md</code> (Milestone B).</p>
  <img id="preview" alt="icon preview">
  <button id="dl">⬇ Download icon-only.png (1024×1024)</button>

<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#13315a"/><stop offset="1" stop-color="#0c1f38"/></linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0ad45"/><stop offset="1" stop-color="#b9881f"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.28"/></filter>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <g filter="url(#sh)"><rect x="258" y="196" width="470" height="600" rx="28" fill="#f7f3ea"/></g>
  <rect x="316" y="270" width="354" height="40" rx="10" fill="#13315a"/>
  <g fill="#c4ccd6">
    <rect x="316" y="356" width="354" height="20" rx="10"/>
    <rect x="316" y="404" width="354" height="20" rx="10"/>
    <rect x="316" y="452" width="284" height="20" rx="10"/>
    <rect x="316" y="500" width="354" height="20" rx="10"/>
    <rect x="316" y="548" width="230" height="20" rx="10"/>
  </g>
  <g filter="url(#sh)">
    <circle cx="690" cy="720" r="150" fill="url(#seal)"/>
    <circle cx="690" cy="720" r="150" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="6"/>
    <circle cx="690" cy="720" r="118" fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="4"/>
  </g>
  <text x="690" y="734" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="120" fill="#fff" letter-spacing="2">NY</text>
  <text x="690" y="800" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="30" fill="#fff" letter-spacing="4">NOTARY</text>
  <path d="M636 856 l54 -36 54 36 0 86 -54 -34 -54 34 Z" fill="#b9881f"/>
</svg>`;

const url = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(SVG);
document.getElementById('preview').src = url;

document.getElementById('dl').onclick = () => {
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 1024, 1024);
    c.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'icon-only.png';
      a.click();
    }, 'image/png');
  };
  img.src = url;
};
</script>
</body>
</html>
